name: Format Rust sources

on:
  push:
    branches: [ci-fix-rust-format]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ci-fix-rust-format
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Format Rust sources
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml
      - name: Commit formatted sources
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git commit -m "style: format Rust sources"
          git push origin HEAD:ci-fix-rust-format
