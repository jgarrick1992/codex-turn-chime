name: Release installers

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            label: macos-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            label: windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run icons
      - name: Stage sidecar placeholder for the Tauri build script
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            : > "src-tauri/binaries/codex-turn-chime-hook-${{ matrix.target }}.exe"
          else
            : > "src-tauri/binaries/codex-turn-chime-hook-${{ matrix.target }}"
          fi
      - name: Build Hook helper sidecar
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin codex-turn-chime-hook --target ${{ matrix.target }}
      - name: Stage target-triple sidecar
        run: node scripts/stage-sidecar.mjs ${{ matrix.target }} release
      - name: Build and attach installers to a draft prerelease
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CodexTurnChime ${{ github.ref_name }}
          releaseBody: |
            Independent open-source beta. Not affiliated with, endorsed by, or sponsored by OpenAI.

            Highlights:
            - Local Codex lifecycle Hook monitoring with diagnostics and unread task history.
            - Lumi AI Voice 01 bilingual prompts that automatically follow the UI language.
            - Configurable repeating reminders, volume boost up to 200%, and one-click mark all as read.
            - Global shortcut to dismiss the current reminder without opening the app.
            - macOS window restoration from the Dock, tray icon, tray menu, or a second launch.

            This prerelease is unsigned: macOS uses ad-hoc signing and Windows installers have no Authenticode certificate. Verify SHA-256 checksums, SBOMs, and GitHub build provenance. Do not globally disable operating-system security features.
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p artifacts
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          format: spdx-json
          output-file: artifacts/CodexTurnChime-${{ matrix.label }}.spdx.json
          upload-artifact: false
      - name: Generate macOS SHA-256 file
        if: runner.os == 'macOS'
        shell: bash
        run: find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -type f -name '*.dmg' -exec shasum -a 256 {} \; > artifacts/SHA256SUMS-${{ matrix.label }}.txt
      - name: Generate Windows SHA-256 file
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse "src-tauri/target/${{ matrix.target }}/release/bundle" -Include *.exe
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content "artifacts/SHA256SUMS-${{ matrix.label }}.txt"
      - name: Attest macOS installer
        if: runner.os == 'macOS'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
      - name: Attest Windows installer
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
      - name: Attach checksums and SBOM
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: artifacts/*

  publish:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish the completed draft release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const release = releases.find((candidate) => candidate.tag_name === tag && candidate.draft);
            if (!release) {
              throw new Error(`Draft release for ${tag} was not found`);
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              draft: false,
              prerelease: true,
            });
