name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  rust:
    name: Rust (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64 target
            os: macos-14
            target: aarch64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Stage frontend placeholder for Rust checks
        shell: bash
        run: |
          mkdir -p dist
          printf '%s\n' '<!doctype html><title>CodexTurnChime CI</title>' > dist/index.html
      - name: Stage sidecar placeholder for Rust checks
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            : > "src-tauri/binaries/codex-turn-chime-hook-${{ matrix.target }}.exe"
          else
            : > "src-tauri/binaries/codex-turn-chime-hook-${{ matrix.target }}"
          fi
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo check --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

  dependency-security:
    name: Rust dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
        working-directory: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --config ../deny.toml check
        working-directory: src-tauri
