name: Bug report
description: Report a reproducible CodexTurnChime problem
title: "bug: "
labels: ["type: bug", "needs: triage"]
body:
  - type: markdown
    attributes:
      value: "Do not paste prompts, answers, commands, credentials, or raw transcript content."
  - type: input
    id: version
    attributes: { label: App version, placeholder: v0.1.0-beta.1 }
    validations: { required: true }
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: ["macOS 13+ Apple Silicon", "Windows 11 x64"]
    validations: { required: true }
  - type: textarea
    id: description
    attributes: { label: "What happened?", description: "Describe the expected and actual behavior." }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes: { label: Reproduction steps, placeholder: "1. ...\n2. ..." }
    validations: { required: true }
  - type: textarea
    id: diagnostics
    attributes: { label: Diagnostic check results, description: Share pass/fail only and redact private paths. }
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed conversation content, secrets, and private paths.
          required: true
